<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#344b33"/>

  <g transform="translate(50, 50)">
    <!-- Globe circle -->
    <circle cx="0" cy="5" r="22" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Globe latitude lines (vertical curves) -->
    <ellipse cx="0" cy="5" rx="10" ry="22" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>

    <!-- Globe horizontal lines -->
    <line x1="-22" y1="5" x2="22" y2="5" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
    <line x1="-20" y1="-5" x2="-7" y2="-5" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="7" y1="-5" x2="20" y2="-5" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="-20" y1="15" x2="20" y2="15" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

    <!-- Pin shadow -->
    <ellipse cx="0" cy="1" rx="7" ry="2.5" fill="#000000" opacity="0.15"/>

    <!-- Pin body -->
    <path d="M0,2 C0,2 9,-10 9,-16 C9,-21 5,-25 0,-25 C-5,-25 -9,-21 -9,-16 C-9,-10 0,2 0,2Z" fill="#b34a00" stroke="none"/>

    <!-- Inner circle on pin -->
    <circle cx="0" cy="-16" r="4.5" fill="#ffffff"/>
    <circle cx="0" cy="-16" r="2" fill="#b34a00" opacity="0.3"/>
  </g>
</svg>
